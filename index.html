<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>工場メモ</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #252836;
    --accent: #f5a623;
    --accent2: #e8851a;
    --danger: #e05555;
    --text: #e8eaf0;
    --text-muted: #7a7f94;
    --border: #2e3347;
    --recording: #e05555;
    --success: #4caf8a;
    --tag-bg: #2a2d3e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }

  button, .tab, .tag-btn {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .app-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .memo-count {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--tag-bg);
    padding: 3px 8px;
    border-radius: 10px;
  }

  .filter-tabs {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    overflow-x: auto;
    padding-bottom: 2px;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  main {
    flex: 1;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 200px;
    transition: padding-bottom 0.15s;
  }

  .memo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    position: relative;
    transition: border-color 0.15s;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .memo-card:active { border-color: var(--accent); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .tag-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.04em;
  }
  .tag-安全   { background: #5b2020; color: #f08080; }
  .tag-品質   { background: #1e3a5b; color: #7eb8f0; }
  .tag-設備   { background: #2d3b1e; color: #8ecb68; }
  .tag-改善   { background: #3b2d1e; color: #f0b868; }
  .tag-採用   { background: #2d1e5b; color: #b068f0; }
  .tag-人員   { background: #1e4a4a; color: #68e0d0; }
  .tag-生産計画 { background: #3b1e2d; color: #f068a0; }
  .tag-その他 { background: var(--tag-bg); color: var(--text-muted); }

  .card-time {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }
  .memo-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    word-break: break-all;
  }
  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    justify-content: flex-end;
  }
  .btn-copy, .btn-delete {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-copy  { color: var(--text-muted); }
  .btn-copy:active  { background: var(--surface2); color: var(--text); }
  .btn-edit  { color: var(--accent); border-color: #3d3020; }
  .btn-edit:active  { background: #2a2010; }
  .btn-delete { color: var(--danger); border-color: #3d2020; }
  .btn-delete:active { background: #2a1515; }

  /* インライン編集 */
  .edit-area {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    line-height: 1.5;
    margin-top: 8px;
  }
  .edit-area:focus { outline: none; }
  .btn-edit-save { color: var(--success); border-color: #1e3d2d; }
  .btn-edit-save:active { background: #1a2d22; }
  .btn-edit-cancel { color: var(--text-muted); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; line-height: 1.8; }

  .record-panel {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px max(24px, env(safe-area-inset-bottom));
    z-index: 200;
  }

  .tag-selector {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    overflow-x: auto;
  }
  .tag-selector::-webkit-scrollbar { display: none; }
  .tag-btn {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--tag-bg);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tag-btn.selected { border-color: var(--accent); color: var(--accent); }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .memo-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 44px;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }
  .memo-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .memo-input::placeholder { color: var(--text-muted); }

  .btn-record {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #000;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(245,166,35,0.4);
  }
  .btn-record.recording {
    background: var(--recording);
    animation: pulse 1.2s ease-in-out infinite;
    box-shadow: 0 2px 16px rgba(224,85,85,0.6);
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 2px 12px rgba(224,85,85,0.5); }
    50%       { transform: scale(1.1); box-shadow: 0 2px 20px rgba(224,85,85,0.8); }
  }

  .btn-save {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    background: var(--success);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(76,175,138,0.3);
  }
  .btn-save:active { transform: scale(0.93); }

  .status-bar {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
    min-height: 16px;
    text-align: center;
  }
  .status-bar.listening { color: var(--recording); }
  .status-bar.saved     { color: var(--success); }

  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--success);
    color: #fff;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
    z-index: 300;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .btn-export {
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
  }
  .btn-export:active { background: var(--surface2); }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .storage-icon {
    font-size: 12px;
    color: var(--success);
    margin-right: 2px;
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <span class="app-title">🏭 工場メモ</span>
    <div class="header-actions">
      <button class="btn-export" onclick="exportToExcel()">📊 日報</button>
      <span class="memo-count" id="memoCount">0件</span>
    </div>
  </div>
  <div class="filter-tabs" id="filterTabs">
    <button class="tab active" data-tag="すべて" onclick="filterMemos(this, 'すべて')">すべて</button>
    <button class="tab" data-tag="安全"   onclick="filterMemos(this, '安全')">🔴 安全</button>
    <button class="tab" data-tag="品質"   onclick="filterMemos(this, '品質')">🔵 品質</button>
    <button class="tab" data-tag="設備"   onclick="filterMemos(this, '設備')">🟢 設備</button>
    <button class="tab" data-tag="改善"   onclick="filterMemos(this, '改善')">🟡 改善</button>
    <button class="tab" data-tag="採用"   onclick="filterMemos(this, '採用')">🟣 採用</button>
    <button class="tab" data-tag="人員"   onclick="filterMemos(this, '人員')">🩵 人員</button>
    <button class="tab" data-tag="生産計画" onclick="filterMemos(this, '生産計画')">🩷 生産計画</button>
    <button class="tab" data-tag="その他" onclick="filterMemos(this, 'その他')">⚪ その他</button>
  </div>
</header>

<main id="memoList">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📋</div>
    <p>まだメモがありません。<br>マイクボタンで音声入力、<br>または直接テキストを入力してください。</p>
  </div>
</main>

<div class="record-panel">
  <div class="status-bar" id="statusBar">
    <span class="storage-icon">💾</span>端末に保存中
  </div>
  <div class="tag-selector" id="tagSelector">
    <button class="tag-btn selected" data-tag="その他" onclick="selectTag(this, 'その他')">その他</button>
    <button class="tag-btn" data-tag="安全"   onclick="selectTag(this, '安全')">🔴 安全</button>
    <button class="tag-btn" data-tag="品質"   onclick="selectTag(this, '品質')">🔵 品質</button>
    <button class="tag-btn" data-tag="設備"   onclick="selectTag(this, '設備')">🟢 設備</button>
    <button class="tag-btn" data-tag="改善"   onclick="selectTag(this, '改善')">🟡 改善</button>
    <button class="tag-btn" data-tag="採用"   onclick="selectTag(this, '採用')">🟣 採用</button>
    <button class="tag-btn" data-tag="人員"   onclick="selectTag(this, '人員')">🩵 人員</button>
    <button class="tag-btn" data-tag="生産計画" onclick="selectTag(this, '生産計画')">🩷 生産計画</button>
  </div>
  <div class="input-row">
    <button class="btn-record" id="btnRecord" onclick="toggleRecording()" title="音声入力">🎤</button>
    <textarea class="memo-input" id="memoInput" placeholder="気づきをメモ…" rows="1"
      oninput="autoResize(this)"></textarea>
    <button class="btn-save" onclick="saveCurrentMemo()" title="保存">✓</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== ストレージ操作 =====
const STORAGE_KEY = 'factory-memos';
const LOG_KEY = 'factory-memos-log';

function loadMemos() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveMemos(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function loadLog() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY) || '[]'); }
  catch { return []; }
}

function appendLog(memo) {
  const log = loadLog();
  log.push(memo);
  localStorage.setItem(LOG_KEY, JSON.stringify(log));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// ===== 状態管理 =====
let memos = loadMemos();
let selectedTag = 'その他';
let currentFilter = 'すべて';
let recognition = null;
let isRecording = false;
let recordingPrefix = '';

// 起動時に描画
renderMemos();
setStatus('タグを選んで録音 or テキスト入力', '');

// ===== 音声認識セットアップ =====
function setupRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;
  const r = new SpeechRecognition();
  r.lang = 'ja-JP';
  r.continuous = false;
  r.interimResults = true;

  r.onstart = () => {
    isRecording = true;
    document.getElementById('btnRecord').classList.add('recording');
    document.getElementById('btnRecord').textContent = '⏹';
    setStatus('🔴 聞き取り中…', 'listening');
  };

  r.onresult = (e) => {
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    const combined = recordingPrefix ? recordingPrefix + ' ' + transcript : transcript;
    document.getElementById('memoInput').value = combined;
    autoResize(document.getElementById('memoInput'));
  };

  r.onend = () => {
    isRecording = false;
    document.getElementById('btnRecord').classList.remove('recording');
    document.getElementById('btnRecord').textContent = '🎤';
    const text = document.getElementById('memoInput').value.trim();
    if (text) {
      setStatus('✅ 認識完了。保存ボタンで記録', 'saved');
    } else {
      setStatus('タグを選んで録音 or テキスト入力', '');
    }
  };

  r.onerror = (e) => {
    isRecording = false;
    document.getElementById('btnRecord').classList.remove('recording');
    document.getElementById('btnRecord').textContent = '🎤';
    if (e.error === 'not-allowed') {
      setStatus('❌ マイクの許可が必要です', '');
    } else if (e.error === 'no-speech') {
      setStatus('声が聞き取れませんでした', '');
    } else {
      setStatus('エラー: ' + e.error, '');
    }
  };

  return r;
}

// ===== 録音トグル =====
function toggleRecording() {
  if (!recognition) {
    recognition = setupRecognition();
    if (!recognition) {
      alert('このブラウザは音声認識に対応していません。\nChromeブラウザをお試しください。');
      return;
    }
  }
  if (isRecording) {
    recognition.stop();
  } else {
    recordingPrefix = document.getElementById('memoInput').value.trim();
    recognition.start();
  }
}

// ===== メモ保存 =====
function saveCurrentMemo() {
  const text = document.getElementById('memoInput').value.trim();
  if (!text) {
    showToast('テキストを入力してください');
    return;
  }

  const now = new Date();
  const memo = {
    id: genId(),
    text,
    tag: selectedTag,
    date: now.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' }),
    time: now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }),
    timeDisplay: now.toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
    createdAt: now.getTime()
  };

  memos.unshift(memo);
  saveMemos(memos);
  appendLog(memo);

  document.getElementById('memoInput').value = '';
  autoResize(document.getElementById('memoInput'));
  renderMemos();
  setStatus('タグを選んで録音 or テキスト入力', '');
  showToast('✅ メモを保存しました');
}

// ===== タグ選択 =====
function selectTag(el, tag) {
  selectedTag = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

// ===== フィルター =====
function filterMemos(el, tag) {
  currentFilter = tag;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderMemos();
}

// ===== レンダリング =====
function renderMemos() {
  const list = document.getElementById('memoList');
  const filtered = currentFilter === 'すべて'
    ? memos
    : memos.filter(m => m.tag === currentFilter);

  document.getElementById('memoCount').textContent = memos.length + '件';
  document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'block';

  list.querySelectorAll('.memo-card').forEach(c => c.remove());

  filtered.forEach(memo => {
    const card = document.createElement('div');
    card.className = 'memo-card';
    card.dataset.fid = memo.id;
    card.innerHTML = `
      <div class="card-header">
        <span class="tag-badge tag-${memo.tag}">${memo.tag}</span>
        <span class="card-time">${memo.timeDisplay || memo.time || ''}</span>
      </div>
      <div class="memo-text">${escapeHtml(memo.text)}</div>
      <div class="card-actions" id="actions-${memo.id}">
        <button class="btn-copy btn-edit-cancel" onclick="copyMemo('${memo.id}')">コピー</button>
        <button class="btn-copy btn-edit" onclick="startEdit('${memo.id}')">編集</button>
        <button class="btn-delete" onclick="deleteMemo('${memo.id}')">削除</button>
      </div>
    `;
    list.appendChild(card);
  });
}

// ===== 編集 =====
const ALL_TAGS = ['その他', '安全', '品質', '設備', '改善', '採用', '人員', '生産計画'];
const TAG_ICONS = { '安全':'🔴', '品質':'🔵', '設備':'🟢', '改善':'🟡', '採用':'🟣', '人員':'🩵', '生産計画':'🩷', 'その他':'⚪' };

function startEdit(id) {
  const memo = memos.find(m => m.id === id);
  if (!memo) return;

  const card = document.querySelector(`[data-fid="${id}"]`);
  const textEl = card.querySelector('.memo-text');
  const actionsEl = document.getElementById(`actions-${id}`);

  const tagRow = document.createElement('div');
  tagRow.className = 'tag-selector';
  tagRow.id = `edit-tags-${id}`;
  tagRow.style.marginTop = '8px';
  tagRow.innerHTML = ALL_TAGS.map(t => `
    <button class="tag-btn${t === memo.tag ? ' selected' : ''}"
      onclick="selectEditTag(this, '${id}')" data-tag="${t}">
      ${TAG_ICONS[t]} ${t}
    </button>`).join('');
  textEl.before(tagRow);

  const textarea = document.createElement('textarea');
  textarea.className = 'edit-area';
  textarea.value = memo.text;
  textarea.rows = 3;
  textEl.replaceWith(textarea);
  textarea.focus();

  actionsEl.innerHTML = `
    <button class="btn-copy btn-edit-cancel" onclick="cancelEdit()">キャンセル</button>
    <button class="btn-copy btn-edit-save" onclick="saveEdit('${id}')">保存</button>
  `;
}

function selectEditTag(el, id) {
  document.querySelectorAll(`#edit-tags-${id} .tag-btn`).forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function cancelEdit() {
  renderMemos();
}

function saveEdit(id) {
  const card = document.querySelector(`[data-fid="${id}"]`);
  const textarea = card.querySelector('.edit-area');
  const newText = textarea.value.trim();
  if (!newText) { showToast('テキストを入力してください'); return; }

  const selectedTagBtn = card.querySelector(`#edit-tags-${id} .tag-btn.selected`);
  const newTag = selectedTagBtn ? selectedTagBtn.dataset.tag : null;

  const idx = memos.findIndex(m => m.id === id);
  if (idx === -1) return;
  memos[idx].text = newText;
  if (newTag) memos[idx].tag = newTag;
  saveMemos(memos);
  renderMemos();
  showToast('✅ 編集しました');
}

// ===== 削除（アクティブリストのみ。ログは保持） =====
function deleteMemo(id) {
  if (!confirm('このメモを削除しますか？\n※日報ログには記録が残ります。')) return;
  memos = memos.filter(m => m.id !== id);
  saveMemos(memos);
  renderMemos();
}

// ===== コピー =====
function copyMemo(id) {
  const memo = memos.find(m => m.id === id);
  if (!memo) return;
  const text = `[${memo.tag}] ${memo.timeDisplay || memo.time}\n${memo.text}`;
  navigator.clipboard.writeText(text).then(() => showToast('📋 コピーしました'));
}

// ===== 日報Excelエクスポート（永続ログから出力） =====
function exportToExcel() {
  const log = loadLog();
  if (!log.length) {
    showToast('記録がありません');
    return;
  }

  showToast('📊 日報を作成中…');
  const wsData = [['日付', '時刻', 'カテゴリ', '内容']];
  log.forEach(m => wsData.push([m.date || '', m.time || '', m.tag, m.text]));

  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{ wch: 14 }, { wch: 8 }, { wch: 8 }, { wch: 50 }];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '日報');
  const dateStr = new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-');
  XLSX.writeFile(wb, `日報_${dateStr}.xlsx`);
  showToast('📊 日報Excelを出力しました');
}

// ===== ユーティリティ =====
function setStatus(msg, cls) {
  const el = document.getElementById('statusBar');
  el.innerHTML = `<span class="storage-icon">💾</span>${msg}`;
  el.className = 'status-bar' + (cls ? ' ' + cls : '');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

document.getElementById('memoInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    saveCurrentMemo();
  }
});

// 仮想キーボード表示時にパネルが隠れないよう調整
if (window.visualViewport) {
  const panel = document.querySelector('.record-panel');
  const main = document.getElementById('memoList');
  window.visualViewport.addEventListener('resize', () => {
    const offset = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
    if (offset > 50) {
      panel.style.bottom = offset + 'px';
      main.style.paddingBottom = (200 + offset) + 'px';
    } else {
      panel.style.bottom = '0';
      main.style.paddingBottom = '200px';
    }
  });
}
</script>
